<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
  .header { text-align: center; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
  
  /* নেভিগেশন সেকশন */
  .nav-section { background: #2c3e50; padding: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; }
  select { padding: 12px; border-radius: 8px; border: 2px solid #34495e; font-size: 15px; min-width: 200px; cursor: pointer; }
  .btn-search { padding: 12px 30px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
  .btn-search:hover { background: #2ecc71; }

  /* প্রশ্ন কার্ড ডিজাইন */
  .question-container { max-width: 800px; margin: auto; display: none; } /* শুরুতে হাইড থাকবে */
  .mcq-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 6px solid #3498db; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
  
  /* গোল সার্কেল আনসার ও সলভ বাটন */
  .footer-row { margin-top: 20px; display: flex; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
  .ans-circle { width: 35px; height: 35px; border-radius: 50%; background: #27ae60; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }
  .solve-link { color: #e67e22; text-decoration: none; font-weight: bold; font-size: 14px; border: 2px solid #e67e22; padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
  .solve-link:hover { background: #e67e22; color: white; }
</style>
</head>
<body>

<div class="header">
  <h1>কলেজ কোয়েশ্চেন ব্যাংক</h1>
  <p>ময়মনসিংহের সকল সেরা কলেজের ডিজিটাল প্রশ্নপত্র এখানে পাবে</p>
</div>

<!-- ড্রপডাউন নেভিগেশন -->
<div class="nav-section">
  <select id="college">
    <option value="">কলেজ নির্বাচন করো</option>
    <option value="amc">Ananda Mohan College</option>
    <option value="mgwc">মুমিনুন্নিসা সরকারি মহিলা কলেজ</option>
    <option value="ssnic">শহীদ সৈয়দ নজরুল ইসলাম কলেজ</option>
  </select>

  <select id="exam">
    <option value="">পরীক্ষা</option>
    <option value="coaching">কোচিং প্রস্তুতি</option>
    <option value="pretest">প্রি-টেস্ট</option>
  </select>

  <select id="subject">
    <option value="">বিষয়</option>
    <option value="chem">রসায়ন</option>
  </select>

  <button class="btn-search" onclick="showQuestion()">প্রশ্ন দেখুন</button>
</div>

<!-- প্রশ্নপত্র এরিয়া -->
<div id="question-area" class="question-container">
  <h2 id="q-header" style="text-align: center; margin-bottom: 20px;"></h2>

  <!-- প্রশ্ন ১ -->
  <div class="mcq-card">
    <p><strong>১. উদ্দীপকের $H_2$ গ্যাসের মোল ভগ্নাংশ কত হবে?</strong></p>
    <div class="options">
      <div>ক) 1/2</div>
      <div>খ) 8/9</div>
      <div>গ) 1/9</div>
      <div>ঘ) 16/17</div>
    </div>
    <div class="footer-row">
      <div class="ans-circle">খ</div>
      <a href="#" class="solve-link">SOLVE</a>
    </div>
  </div>

  <!-- প্রশ্ন ৫ -->
  <div class="mcq-card">
    <p><strong>৫. C.F.C-113 নিচের কোনটি?</strong></p>
    <div class="options">
      <div>ক) CF₂Cl.CFCl₂</div>
      <div>খ) CF₂Cl₂</div>
      <div>গ) CFCl₃</div>
      <div>ঘ) CHF₂Cl</div>
    </div>
    <div class="footer-row">
      <div class="ans-circle">ক</div>
      <a href="#" class="solve-link">SOLVE</a>
    </div>
  </div>
</div>

<script>
function showQuestion() {
  const college = document.getElementById('college').value;
  const exam = document.getElementById('exam').value;
  const subject = document.getElementById('subject').value;

  if (college && exam && subject) {
    // হেডার আপডেট করা
    const collegeName = document.getElementById('college').options[document.getElementById('college').selectedIndex].text;
    document.getElementById('q-header').innerText = collegeName + " - " + subject;
    
    // প্রশ্ন এরিয়া দেখানো
    document.getElementById('question-area').style.display = 'block';
    
    // স্মুথ স্ক্রল
    window.scrollTo({ top: 500, behavior: 'smooth' });
  } else {
    alert("দয়া করে সবগুলো অপশন সিলেক্ট করো!");
  }
}
</script>

</body>
</html>
